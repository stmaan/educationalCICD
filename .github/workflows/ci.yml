name: CI/CD Multi-Environment

on:
  push:
    branches: [ main, staging ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment Name
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: stmaan/educationalcicd:${{ env.ENV_NAME }}

      - name: Setup Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to K8s
        run: |
          # Явно указываем namespace через переменную ENV_NAME
          kubectl apply -f k8s-deployment.yml -n ${{ env.ENV_NAME }}
          # Обновляем образ на правильный тег (staging или production)
          kubectl set image deployment/educational-app python-app=stmaan/educationalcicd:${{ env.ENV_NAME }} -n ${{ env.ENV_NAME }}
