name: CI/CD with Approval and Email

on:
  push:
    branches: [ main, staging ]

jobs:
  # --- ЗАДАЧА 1: Сборка и деплой в Staging ---
  build-and-staging:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Bitrix (Start)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 CI/CD Start: ${{ github.ref_name }}"
          to: fwd9nceujle25sss4w88wwk0scws@stmaan.bitrix24.ru
          from: "GitHub Actions Runner"
          body: |
            Началась сборка ветки: ${{ github.ref_name }}
            Автор: ${{ github.actor }}
            Ссылка на запуск: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: stmaan/educationalcicd:staging

      - name: Deploy to Staging
        run: |
          kubectl apply -f k8s-deployment.yml -n staging
          kubectl set image deployment/educational-app python-app=stmaan/educationalcicd:staging -n staging

  # --- ЗАДАЧА 2: Деплой в Production (с ручным одобрением) ---
  deploy-production:
    runs-on: self-hosted
    needs: build-and-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to Production
        run: |
          kubectl apply -f k8s-deployment.yml -n production
          kubectl set image deployment/educational-app python-app=stmaan/educationalcicd:staging -n production

      - name: Notify Bitrix (Prod Success)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ PROD UPDATED: ${{ github.ref_name }}"
          to: fwd9nceujle25sss4w88wwk0scws@stmaan.bitrix24.ru
          from: "GitHub Actions Runner"
          body: |
            Production успешно обновлен!
            Окружение: ${{ github.ref_name }}
            Лог сборки: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
