name: CI/CD with Telegram Notifications

on:
  push:
    branches: [ main, staging ]

jobs:
  build-and-staging:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Telegram (Start)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Началась сборка ветки ${{ github.ref_name }}.
            Автор: ${{ github.actor }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: stmaan/educationalcicd:staging

      - name: Deploy to Staging
        run: |
          kubectl apply -f k8s-deployment.yml -n staging
          kubectl set image deployment/educational-app python-app=stmaan/educationalcicd:staging -n staging

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Staging деплой успешно завершен!
            ${{ github.ref_name == 'main' && '⏳ Жду подтверждения для Production...' || '👌 Готово к тестам.' }}

  deploy-production:
    runs-on: self-hosted
    needs: build-and-staging
    if: github.ref == 'heads/main'
    environment: production
    
    steps:
      - name: Deploy to Production
        run: |
          kubectl apply -f k8s-deployment.yml -n production
          kubectl set image deployment/educational-app python-app=stmaan/educationalcicd:staging -n production

      - name: Notify Telegram (Prod Success)
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀🚀🚀 PRODUCTION ОБНОВЛЕН! 🚀🚀🚀
            Приложение доступно в основном неймспейсе.
