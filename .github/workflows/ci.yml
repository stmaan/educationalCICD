name: CI/CD with Bitrix24 Email Notify

on:
  push:
    branches: [ main, staging ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Bitrix (Start)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 CI/CD Start: ${{ github.ref_name }}"
          to: fwd9nceujle25sss4w88wwk0scws@stmaan.bitrix24.ru
          from: "GitHub Actions Runner"
          body: |
            Начался деплой.
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: stmaan/educationalcicd:${{ github.ref_name == 'main' && 'latest' || 'staging' }}

      - name: Setup Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          # Деплоим в нужный неймспейс
          ENV_NAME=${{ github.ref_name == 'main' && 'production' || 'staging' }}
          IMAGE_TAG=${{ github.ref_name == 'main' && 'latest' || 'staging' }}
          
          kubectl apply -f k8s-deployment.yml -n $ENV_NAME
          kubectl set image deployment/educational-app python-app=stmaan/educationalcicd:$IMAGE_TAG -n $ENV_NAME

      - name: Notify Bitrix (Success)
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ CI/CD Success: ${{ github.ref_name }}"
          to: fwd9nceujle25sss4w88wwk0scws@stmaan.bitrix24.ru
          from: "GitHub Actions Runner"
          body: "Деплой завершен успешно. Проверь окружение ${{ github.ref_name }}."
