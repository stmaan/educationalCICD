apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-binding
subjects:
- kind: ServiceAccount
  name: github-actions-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: edit # Дает права на изменение ресурсов (deployments, pods)
  apiGroup: rbac.authorization.k8s.io
